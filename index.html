<style>
*{box-sizing:border-box;margin:0;padding:0}

body{background:var(--bg);color:var(--tx);font-family:"Rajdhani",sans-serif;min-height:100vh;overflow-x:hidden}

/* AMBIENT BACKGROUND */
body::before{

  background-size:48px 48px;
  animation:gridMove 24s linear infinite;
}
@keyframes gridMove{0%{background-position:0 0}100%{background-position:48px 48px}}
body::after{
  content:"";position:fixed;top:-30vh;left:-20vw;width:80vw;height:80vw;

}

button{cursor:pointer;border:none;background:none;font-family:inherit;color:inherit}
img{display:block}
::-webkit-scrollbar{width:4px;height:4px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:7px;padding:10px 22px;border-radius:9px;font-size:13px;font-weight:700;font-family:"Rajdhani",sans-serif;letter-spacing:.5px;text-transform:uppercase;transition:all .2s;cursor:pointer;border:none}

.row{display:flex;gap:12px;overflow-x:auto;padding-bottom:10px;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none}

.card{flex-shrink:0;width:var(--cw);cursor:pointer;scroll-snap-align:start;transition:transform .25s}

.cb-vn{background:var(--green)}.cb-bo{background:#2563eb}.cb-le{background:var(--primary2)}.cb-hh{background:#059669}.cb-lt{background:var(--gold);color:#000}.cb-ani{background:var(--purple);color:#000}.cb-yt{background:var(--yt)}

.c-title{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}

/* CARD — LANDSCAPE (YouTube) */
.yt-card{flex-shrink:0;width:210px;cursor:pointer;scroll-snap-align:start;transition:transform .2s}

/* DETAIL */
.det{padding-top:var(--nh)}

/* LT PAGE */
.lt-page{padding:calc(var(--nh) + 24px) clamp(10px,3vw,48px) 36px}
.lt-page h1{font-family:"Orbitron",sans-serif;font-size:26px;margin-bottom:5px;letter-spacing:2px}
.lt-page p{font-size:13px;color:var(--mu);margin-bottom:18px}
.lt-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px}
.lt-tab{padding:7px 16px;border-radius:8px;font-size:13px;font-weight:600;color:var(--mu);background:var(--s2);border:1px solid var(--bd);cursor:pointer;transition:all .18s}
.lt-tab:hover{color:var(--tx)}.lt-tab.on{background:var(--gold);color:#000;border-color:var(--gold);box-shadow:0 0 12px rgba(251,191,36,.3)}

/* SEARCH PAGE */
.search-page{padding:calc(var(--nh) + 24px) clamp(10px,3vw,48px) 36px}
.search-page h1{font-family:"Orbitron",sans-serif;font-size:26px;margin-bottom:14px;letter-spacing:2px}
.big-search-wrap{position:relative;max-width:500px;margin-bottom:14px}
.big-search-wrap span{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--mu);font-size:14px}
.big-search{width:100%;background:var(--s2);border:1.5px solid var(--bd);border-radius:10px;padding:11px 14px 11px 40px;color:var(--tx);font-size:14px;font-family:"Rajdhani",sans-serif;font-weight:500;outline:none;transition:border-color .2s,box-shadow .2s}
.big-search:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(79,124,255,.12)}
.filter-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.f-tab{padding:6px 13px;border-radius:7px;font-size:12px;font-weight:600;background:var(--s2);border:1px solid var(--bd);color:var(--mu);cursor:pointer;transition:all .18s;text-transform:uppercase;letter-spacing:.5px}
.f-tab:hover{color:var(--tx)}
.f-tab.on-all{background:linear-gradient(135deg,var(--primary),var(--primary2));border-color:var(--primary);color:#fff}
.f-tab.on-vn{background:var(--green);border-color:var(--green);color:#fff}
.f-tab.on-lt{background:var(--gold);border-color:var(--gold);color:#000}
.f-tab.on-ani{background:var(--purple);border-color:var(--purple);color:#000}
.f-tab.on-yt{background:var(--yt);border-color:var(--yt);color:#fff}
.result-count{font-size:12px;color:var(--mu);margin-bottom:12px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(var(--cw),1fr));gap:18px 12px}
.yt-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:18px 12px}

/* CAT PAGE */
.cat-page{padding:calc(var(--nh) + 24px) clamp(10px,3vw,48px) 36px}
.cat-page h1{font-family:"Orbitron",sans-serif;font-size:26px;margin-bottom:14px;letter-spacing:2px}

/* WATCHLIST */
.wl-page{padding:calc(var(--nh) + 24px) clamp(10px,3vw,48px) 36px}
.wl-page h1{font-family:"Orbitron",sans-serif;font-size:26px;margin-bottom:5px;letter-spacing:2px}
.wl-tabs{display:flex;gap:4px;margin:13px 0 18px}
.wl-tab{padding:7px 15px;border-radius:8px;font-size:12.5px;font-weight:600;color:var(--mu);cursor:pointer;transition:all .18s}
.wl-tab:hover{color:var(--tx);background:var(--s2)}.wl-tab.on{background:linear-gradient(135deg,var(--primary),var(--primary2));color:#fff;box-shadow:0 0 16px rgba(79,124,255,.3)}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:34vh;gap:11px;text-align:center}
.empty-state .ico{font-size:48px}.empty-state h3{font-size:18px;font-weight:600}.empty-state p{font-size:13px;color:var(--mu)}

/* SELECT */
.sel{background:var(--s2);border:1px solid var(--bd);color:var(--tx);padding:7px 10px;border-radius:7px;font-size:12.5px;font-family:"Rajdhani",sans-serif;cursor:pointer;outline:none}
.sel:focus{border-color:var(--primary)}

/* TOAST */
#toast{display:none;position:fixed;bottom:18px;right:18px;z-index:9999;background:rgba(11,16,32,.97);border:1px solid var(--bd);border-radius:10px;padding:11px 16px;font-size:13px;font-weight:600;box-shadow:0 8px 28px rgba(0,0,0,.6),0 0 20px rgba(79,124,255,.1);align-items:center;gap:8px;animation:tIn .25s ease;max-width:260px;pointer-events:none;backdrop-filter:blur(12px)}
@keyframes tIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* SPINNER */
.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(79,124,255,.2);border-top-color:var(--primary);border-radius:50%;animation:sp .7s linear infinite}
.spin-lg{width:32px;height:32px;border-width:3px}
@keyframes sp{to{transform:rotate(360deg)}}
.loading{height:65vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:13px}
.loading p{font-size:13px;color:var(--mu)}

/* PAGE ANIM */
.page{animation:pi .3s ease}
@keyframes pi{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* FOOTER */
footer{background:var(--s1);border-top:1px solid var(--bd);padding:28px clamp(10px,3vw,48px);margin-top:24px;position:relative}
footer::before{content:"";position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--primary),var(--primary2),transparent)}
.ft-row{display:flex;justify-content:space-between;flex-wrap:wrap;gap:20px;margin-bottom:20px}
.ft-logo{font-family:"Orbitron",sans-serif;font-size:20px;letter-spacing:2px;background:linear-gradient(135deg,var(--primary),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 8px rgba(79,124,255,.35))}
.ft-logo b{background:linear-gradient(135deg,var(--accent),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:900}
.ft-tag{font-size:12px;color:var(--mu);margin-top:4px}
.ft-src{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.ft-chip{font-size:10px;font-weight:600;padding:2px 9px;border-radius:20px}
.ft-cols{display:flex;gap:28px;flex-wrap:wrap}
.ft-col h4{font-size:9px;font-weight:700;margin-bottom:9px;text-transform:uppercase;letter-spacing:2px;color:var(--primary)}
.ft-col ul{list-style:none;display:flex;flex-direction:column;gap:7px}
.ft-col ul li a{font-size:12px;color:var(--mu);cursor:pointer;transition:color .15s}.ft-col ul li a:hover{color:var(--accent)}
.ft-bot{border-top:1px solid var(--bd);padding-top:13px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;font-size:11px;color:var(--mu)}

@media(max-width:768px){
  :root{--cw:132px;--ch:198px}
  .nav-links{display:none}
  .det-body{flex-direction:column;gap:14px}
  .det-poster{width:120px;height:180px}
  .search-box{width:135px}.search-box:focus-within{width:172px}
  .yt-card{width:175px}.yt-thumb{height:99px}
}
@media(max-width:480px){.hero{height:68vh}.hcont{left:13px;right:13px}}
</style>
</head>
<body>
<div id="app"></div>
<div id="toast"></div>

<script>
// ═══════════════════════════════════════════════════
//  API SOURCES:
//  🇻🇳 KKPhim   → phimapi.com      (Phim Việt)
//  🎌  Jikan    → api.jikan.moe    (Anime)
//  🔴  YouTube  → Invidious API    (YT search, no key)
//  📺  VidSrc   → vidsrc.icu       (Anime player)
//
//  CORS: auto proxy khi mở file local
// ═══════════════════════════════════════════════════
const KK   = 'https://phimapi.com';
const JK   = 'https://api.jikan.moe/v4';
const VS   = 'https://vidsrc.icu/embed';
const KIMG = 'https://phimimg.com';

// Invidious instances (fallback list)
const INV_HOSTS = [
  'https://inv.nadeko.net',
  'https://invidious.privacydev.net',
  'https://yt.artemislena.eu',
];

function isLocal(){ return /^(file|content|null):/.test(location.protocol); }
function px(url){ return isLocal() ? 'https://corsproxy.io/?' + encodeURIComponent(url) : url; }
function kkUrl(p){ return px(KK + p); }
function jkUrl(p){ return px(JK + p); }

function fixImg(u){
  if(!u) return null;
  if(u.startsWith('http')) return u;
  if(u.startsWith('upload/')) return KIMG + '/' + u;
  return KIMG + '/upload/vod/' + u;
}
const PH = (w,h) => `https://placehold.co/${w||155}x${h||232}/111820/64748b?text=...`;
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

// ── CACHE ──
const CACHE = new Map();
async function get(url, bust){
  if(!bust && CACHE.has(url)) return CACHE.get(url);
  const r = await fetch(url, {headers:{'Accept':'application/json'}});
  if(!r.ok) throw new Error('HTTP ' + r.status);
  const d = await r.json();
  if(!bust) CACHE.set(url, d);
  return d;
}

// ── KKPhim ──
const kkNew    = p   => get(kkUrl('/danh-sach/phim-moi-cap-nhat?page='+(p||1)));
const kkCat    = (t,p)=> get(kkUrl('/v1/api/danh-sach/'+t+'?page='+(p||1)+'&limit=24'));
const kkDetail = s   => get(kkUrl('/phim/'+s), true);
const kkSearch = (q,p)=> get(kkUrl('/v1/api/tim-kiem?keyword='+encodeURIComponent(q)+'&limit=24&page='+(p||1)));

// LỒng tiếng: KKPhim có endpoint riêng
const KK_LT_URL = (p) => kkUrl('/v1/api/danh-sach/phim-bo?lang=long-tieng&page='+(p||1)+'&limit=24');
const KK_TM_URL = (p) => kkUrl('/v1/api/danh-sach/phim-bo?lang=thuyet-minh&page='+(p||1)+'&limit=24');
const KK_LT_LE  = (p) => kkUrl('/v1/api/danh-sach/phim-le?lang=long-tieng&page='+(p||1)+'&limit=24');

function kkI(d){ return (d&&d.data&&d.data.items)||(d&&d.items)||[]; }
function kkP(d){ return (d&&d.data&&d.data.params&&d.data.params.pagination&&d.data.params.pagination.totalPages)||1; }

// ── Jikan ──
const jkTop    = p  => get(jkUrl('/top/anime?page='+(p||1)+'&limit=24'));
const jkSeason = () => get(jkUrl('/seasons/now?limit=24'));
const jkSearch = (q,p) => get(jkUrl('/anime?q='+encodeURIComponent(q)+'&page='+(p||1)+'&limit=24'));
const jkDetail = id => get(jkUrl('/anime/'+id+'/full'));

// ── YouTube via Invidious ──
async function ytSearch(q, page){
  page = page||1;
  for(const host of INV_HOSTS){
    try{
      const url = px(host+'/api/v1/search?q='+encodeURIComponent(q)+'&page='+page+'&type=video');
      const d = await get(url, true);
      if(Array.isArray(d) && d.length) return d.filter(v=>v.type==='video'&&v.videoId);
    }catch(e){ continue; }
  }
  return [];
}
function ytThumb(v){
  if(!v.videoThumbnails || !v.videoThumbnails.length) return PH(210,118);
  return v.videoThumbnails.find(t=>t.quality==='medium')?.url
    || v.videoThumbnails.find(t=>t.quality==='default')?.url
    || `https://i.ytimg.com/vi/${v.videoId}/mqdefault.jpg`;
}
function fmtSec(s){ if(!s) return ''; const m=Math.floor(s/60); const sc=s%60; return m+':'+(sc<10?'0':'')+sc; }

// VidSrc
const vsAnime = (id,ep,dub) => `${VS}/anime/${id}/${ep||1}/${dub||0}`;

// ═══════════════════════════════════════
//  STATE
// ═══════════════════════════════════════
const S = {
  page: 'home',
  // navigation data
  slug: null, malId: null, ytId: null,
  q: '', src: 'all',
  cat: '', ltTab: 'bo-lt',
  epIdx: 0, svIdx: 0, epNum: 1, dub: 0,
  // user data
  wl: JSON.parse(localStorage.getItem('lp_wl')||'[]'),
  hist: JSON.parse(localStorage.getItem('lp_h')||'[]'),
};

const inWL = id => S.wl.some(m=>m.uid===String(id));

window.toggleWL = function(raw){
  const m = typeof raw==='string' ? JSON.parse(raw) : raw;
  const k = String(m.uid);
  if(inWL(k)){ S.wl=S.wl.filter(x=>x.uid!==k); showToast('💔 Đã xóa khỏi yêu thích'); }
  else { S.wl.unshift(m); showToast('❤️ Đã thêm vào yêu thích'); }
  localStorage.setItem('lp_wl', JSON.stringify(S.wl));
  const fb = document.getElementById('fav-btn');
  if(fb){ const on=inWL(k); fb.className='fav-btn'+(on?' on':''); fb.textContent=on?'❤️':'🤍'; }
};

function addHist(m){
  S.hist = [m, ...S.hist.filter(x=>x.uid!==m.uid)].slice(0,80);
  localStorage.setItem('lp_h', JSON.stringify(S.hist));
}

let _toast;
function showToast(msg){
  clearTimeout(_toast);
  const el = document.getElementById('toast');
  el.textContent = msg; el.style.display = 'flex';
  _toast = setTimeout(()=>{ el.style.display='none'; }, 2600);
}

window.go = function(page, opts){
  opts = opts||{};
  S.page = page;
  ['slug','malId','ytId','q','src','cat','ltTab'].forEach(k=>{ if(opts[k]!==undefined) S[k]=opts[k]; });
  S.epIdx=0; S.svIdx=0; S.epNum=1; S.dub=0;
  window.scrollTo({top:0,behavior:'smooth'});
  render();
};

// ═══════════════════════════════════════
//  BADGE + TEXT
// ═══════════════════════════════════════
function kkBadge(m){
  const t = m.type||'';
  const lang = (m.lang||'').toLowerCase();
  const isLT = lang.includes('lồng')||lang.includes('long')||lang.includes('thuyết');
  if(isLT) return '<span class="c-badge cb-lt">🔊 LỒNG TIẾNG</span>';
  if(t==='series')   return '<span class="c-badge cb-bo">PHIM BỘ</span>';
  if(t==='single')   return '<span class="c-badge cb-le">PHIM LẺ</span>';
  if(t==='hoathinh') return '<span class="c-badge cb-hh">HOẠT HÌNH</span>';
  return '<span class="c-badge cb-vn">🇻🇳</span>';
}
function kkTxt(m){
  const t=m.type||'';
  if(t==='series')   return 'PHIM BỘ';
  if(t==='single')   return 'PHIM LẺ';
  if(t==='hoathinh') return 'HOẠT HÌNH';
  return 'PHIM VIỆT';
}

// ═══════════════════════════════════════
//  CARD BUILDERS
// ═══════════════════════════════════════
function CardKK(m){
  const title = esc(m.name||m.title||'?');
  const sub   = esc(m.origin_name||'');
  const year  = m.year||'';
  const slug  = m.slug||'';
  const po    = fixImg(m.poster_url||m.thumb_url)||PH();
  const ep    = m.episode_current||'';
  return `<div class="card" onclick="go('det-kk',{slug:'${slug}'})">
    <div class="c-poster">
      <img src="${po}" alt="${title}" loading="lazy" onerror="this.src='${PH()}'">
      ${kkBadge(m)}
      ${ep?`<span class="c-ep">${esc(ep)}</span>`:''}
      <div class="c-ov"><div class="c-play" onclick="event.stopPropagation();go('play-kk',{slug:'${slug}'})">▶</div></div>
    </div>
    <div class="c-info">
      <div class="c-title">${title}</div>
      ${sub&&sub!==title?`<div class="c-sub">${sub}</div>`:''}
      <div class="c-sub">${year}</div>
    </div>
  </div>`;
}

function CardAnime(m){
  const d     = m.node||m;
  const title = esc(d.title||'?');
  const eng   = esc(d.title_english||'');
  const year  = d.year||'';
  const rat   = d.score?d.score.toFixed(1):'';
  const id    = d.mal_id;
  const imgs  = d.images||{};
  const po    = (imgs.jpg&&(imgs.jpg.large_image_url||imgs.jpg.image_url))||(imgs.webp&&imgs.webp.image_url)||PH();
  const eps   = d.episodes?d.episodes+'ep':'';
  return `<div class="card" onclick="go('det-ani',{malId:${id}})">
    <div class="c-poster">
      <img src="${po}" alt="${title}" loading="lazy" onerror="this.src='${PH()}'">
      <span class="c-badge cb-ani">ANIME</span>
      ${rat?`<span class="c-rat">⭐${rat}</span>`:''}
      ${eps?`<span class="c-ep">${eps}</span>`:''}
      <div class="c-ov"><div class="c-play" onclick="event.stopPropagation();go('play-ani',{malId:${id}})">▶</div></div>
    </div>
    <div class="c-info">
      <div class="c-title">${title}</div>
      ${eng&&eng!==title?`<div class="c-sub">${eng}</div>`:''}
      <div class="c-sub">${year}</div>
    </div>
  </div>`;
}

function CardYT(v){
  const id    = v.videoId||'';
  const title = esc(v.title||'');
  const ch    = esc(v.author||'');
  const dur   = fmtSec(v.lengthSeconds||0);
  const thumb = ytThumb(v);
  return `<div class="yt-card" onclick="go('play-yt',{ytId:'${id}'})">
    <div class="yt-thumb">
      <img src="${esc(thumb)}" alt="${title}" loading="lazy" onerror="this.src='${PH(210,118)}'">
      ${dur?`<span class="yt-dur">${dur}</span>`:''}
    </div>
    <div class="yt-info">
      <div class="yt-title">${title}</div>
      <div class="yt-ch">📺 ${ch}</div>
    </div>
  </div>`;
}

function skRow(n=10){
  return '<div class="row">' + Array(n).fill(`<div class="sk sk-p"></div>`).join('') + '</div>';
}
function skYTRow(n=8){
  return '<div class="row">' + Array(n).fill(`<div class="sk sk-yt"></div>`).join('') + '</div>';
}
function skGrid(n=20){
  return '<div class="grid">' + Array(n).fill(`<div class="sk sk-p" style="height:${232}px"></div>`).join('') + '</div>';
}

// ═══════════════════════════════════════
//  NAV
// ═══════════════════════════════════════
function renderNav(){
  const p = S.page;
  const isOn = (pg, cat) => (p===pg && (!cat||S.cat===cat)) ? 'on' : '';
  return `<div id="nav">
    <div class="logo" onclick="go('home')">KHANHNAM<b>.MOVIE</b></div>
    <ul class="nav-links">
      <li><a class="${isOn('home')}" onclick="go('home')">Trang chủ</a></li>
      <li><a class="${isOn('cat','phim-moi')}" onclick="go('cat',{cat:'phim-moi'})">Phim mới</a></li>
      <li><a class="${isOn('cat','phim-le')}" onclick="go('cat',{cat:'phim-le'})">Phim lẻ</a></li>
      <li><a class="${isOn('cat','phim-bo')}" onclick="go('cat',{cat:'phim-bo'})">Phim bộ</a></li>
      <li><a class="${p==='lt'?'on':''}" onclick="go('lt')" style="color:${p==='lt'?'var(--gold)':''}">🔊 Lồng tiếng</a></li>
      <li><a class="${isOn('cat','anime')}" onclick="go('cat',{cat:'anime'})">Anime 🎌</a></li>
      <li><a class="${isOn('cat','yt')}" onclick="go('cat',{cat:'yt'})" style="color:${isOn('cat','yt')?'':S.cat==='yt'?'var(--yt)':''}">🔴 YouTube</a></li>
      <li><a onclick="go('watchlist')">Yêu thích</a></li>
    </ul>
    <div class="nav-right">
      <div class="search-wrap" id="sw">
        <div class="search-box">
          <span style="color:var(--mu);font-size:14px">🔍</span>
          <input type="text" placeholder="Tìm phim, anime, YT..." id="nav-q"
            value="${p==='search'?esc(S.q):''}"
            autocomplete="off"
            oninput="navInput(this.value)"
            onkeydown="if(event.key==='Enter'){go('search',{q:this.value});closeNav()}"
            onfocus="navInput(this.value)"/>
        </div>
        <div id="drop"></div>
      </div>
      <div style="width:34px;height:34px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;cursor:pointer;color:#fff;flex-shrink:0" onclick="go('watchlist')">
        ${S.wl.length||'👤'}
      </div>
    </div>
  </div>`;
}

function renderFooter(){
  return `<footer>
    <div class="ft-row">
      <div>
        <div class="ft-logo">KHANHNAM<b>.MOVIE</b></div>
        <div class="ft-tag">Phim Việt · Anime · YouTube — Hoàn toàn miễn phí</div>
        <div class="ft-src">
          <span class="ft-chip" style="background:rgba(16,185,129,.15);color:var(--green)">🇻🇳 KKPhim</span>
          <span class="ft-chip" style="background:rgba(168,85,247,.15);color:var(--purple)">🎌 Jikan/MAL</span>
          <span class="ft-chip" style="background:rgba(255,0,0,.15);color:var(--yt)">🔴 YouTube</span>
          <span class="ft-chip" style="background:rgba(59,130,246,.15);color:var(--blue)">📺 VidSrc</span>
        </div>
      </div>
      <div class="ft-cols">
        <div class="ft-col"><h4>Phim Việt</h4><ul>
          <li><a onclick="go('cat',{cat:'phim-moi'})">Phim mới</a></li>
          <li><a onclick="go('cat',{cat:'phim-le'})">Phim lẻ</a></li>
          <li><a onclick="go('cat',{cat:'phim-bo'})">Phim bộ</a></li>
          <li><a onclick="go('lt')" style="color:var(--gold)">🔊 Lồng tiếng</a></li>
          <li><a onclick="go('cat',{cat:'hoat-hinh'})">Hoạt hình</a></li>
        </ul></div>

let _ltPage=1;
window.loadLT = async function(p){
  p=p||1; _ltPage=p;
  const grid=document.getElementById('lt-grid');
  const count=document.getElementById('lt-count');
  const more=document.getElementById('lt-more');
  if(!grid) return;
  if(p===1) grid.innerHTML=skGrid(20);

  try{
    let items=[], total=1;
    if(S.ltTab==='bo-lt'){
      const d=await get(KK_LT_URL(p)); items=kkI(d); total=kkP(d);
      // fallback nếu endpoint lang không hoạt động
      if(!items.length){ const d2=await kkSearch('lồng tiếng phim bộ',p); items=kkI(d2); total=kkP(d2); }
    } else if(S.ltTab==='bo-tm'){
      const d=await get(KK_TM_URL(p)); items=kkI(d); total=kkP(d);
      if(!items.length){ const d2=await kkSearch('thuyết minh phim bộ',p); items=kkI(d2); total=kkP(d2); }
    } else if(S.ltTab==='le-lt'){
      const d=await get(KK_LT_LE(p)); items=kkI(d); total=kkP(d);
      if(!items.length){ const d2=await kkSearch('lồng tiếng phim lẻ',p); items=kkI(d2); total=kkP(d2); }
    } else if(S.ltTab==='search-lt'){
      // Search cả lồng tiếng + thuyết minh
      const [r1,r2]=await Promise.all([
        kkSearch('lồng tiếng',p).catch(()=>null),
        kkSearch('thuyết minh',p).catch(()=>null),
      ]);
      const i1=kkI(r1); const i2=kkI(r2);
      const seen=new Set();
      items=[...i1,...i2].filter(m=>{ if(seen.has(m.slug))return false; seen.add(m.slug); return true; });
      total=Math.max(kkP(r1),kkP(r2));
    }

    const cards=items.map(CardKK).join('');
    if(p===1){ grid.innerHTML=cards||'<div style="text-align:center;padding:48px;color:var(--mu)">Không có dữ liệu.</div>'; }
    else{ grid.insertAdjacentHTML('beforeend',cards); }
    if(count) count.textContent=`${items.length} phim · Trang ${p}${total>1?'/'+total:''}`;
    if(more) more.innerHTML=p<Math.min(total,20)?`<button class="btn btn-ghost" onclick="loadLT(${p+1})">Tải thêm ↓</button>`:'';
  }catch(e){
    if(grid) grid.innerHTML=`<div style="text-align:center;padding:48px;color:var(--mu)">Lỗi: ${esc(e.message)}</div>`;
  }
};

let _srchT;
async function pgSearch(){
  const app=document.getElementById('app');
  const q=S.q, src=S.src||'all';
  app.innerHTML=renderNav()+`<div class="search-page page">
    <h1>Tìm kiếm</h1>
    <div class="big-search-wrap">
      <span>🔍</span>
      <input class="big-search" id="srch-q" type="text" placeholder="Tìm phim, anime, YouTube..." value="${esc(q)}" autocomplete="off"
        oninput="liveSearch(this.value)"
        onkeydown="if(event.key==='Enter'){clearTimeout(_srchT);runSearch(this.value,1)}"/>
    </div>
    <div class="filter-tabs">
      <button class="f-tab${src==='all'?' on-all':''}" id="f-all" onclick="setSrc('all')">🔍 Tất cả</button>
      <button class="f-tab${src==='vn'?' on-vn':''}" id="f-vn" onclick="setSrc('vn')">🇻🇳 Phim Việt</button>
      <button class="f-tab${src==='lt'?' on-lt':''}" id="f-lt" onclick="setSrc('lt')">🔊 Lồng tiếng</button>
      <button class="f-tab${src==='ani'?' on-ani':''}" id="f-ani" onclick="setSrc('ani')">🎌 Anime</button>
      <button class="f-tab${src==='yt'?' on-yt':''}" id="f-yt" onclick="setSrc('yt')">🔴 YouTube</button>
    </div>
    <div id="s-count" class="result-count">${q?'Đang tìm...':''}</div>
    <div id="s-grid" class="${src==='yt'?'yt-grid':'grid'}">${q?skGrid(12):''}</div>
    <div id="s-more" style="text-align:center;margin-top:18px"></div>
  </div>`;
  setupNavScroll();
  const inp=document.getElementById('srch-q'); if(inp) inp.focus();
  if(q) await runSearch(q,1);
}
window.setSrc=function(s){ S.src=s; go('search',{q:S.q,src:s}); };
window.liveSearch=function(q){ S.q=q; clearTimeout(_srchT); const g=document.getElementById('s-grid'); if(!q.trim()){if(g)g.innerHTML='';return;} _srchT=setTimeout(()=>runSearch(q,1),480); };

window.runSearch=async function(q,p){
  p=p||1; S.q=q;
  const grid=document.getElementById('s-grid'), count=document.getElementById('s-count'), more=document.getElementById('s-more');
  if(!grid) return;
  const src=S.src||'all';
  if(p===1){ grid.className=src==='yt'?'yt-grid':'grid'; grid.innerHTML=src==='yt'?skGrid(12):skGrid(12); }
  if(count) count.textContent='Đang tìm...';
  try{
    if(src==='yt'){
      grid.className='yt-grid';
      const vids=await ytSearch(q,p);
      if(p===1){ grid.innerHTML=vids.map(CardYT).join('')||`<div style="text-align:center;padding:48px;color:var(--mu)">Không tìm thấy.</div>`; }
      else{ grid.insertAdjacentHTML('beforeend',vids.map(CardYT).join('')); }
      if(count) count.textContent=vids.length?`${vids.length} video YouTube cho "${q}"`:' ';
      if(more) more.innerHTML=vids.length>=5?`<button class="btn btn-ghost" onclick="runSearch('${esc(q)}',${p+1})">Tải thêm ↓</button>`:'';
      return;
    }
    grid.className='grid';
    const doVN=src==='all'||src==='vn';
    const doLT=src==='lt';
    const doAni=src==='all'||src==='ani';
    const doYT=src==='all';

    const [kkR,kkLR,jkR,ytR]=await Promise.all([
      doVN?kkSearch(q,p).catch(()=>null):null,
      doLT?kkSearch(q+' lồng tiếng',1).catch(()=>null):null,
      doAni?jkSearch(q,p).catch(()=>null):null,
      doYT?ytSearch(q,1).catch(()=>[]):null,
    ]);

    const kkItems2=kkR?kkI(kkR):[];
    const kkLItems=kkLR?kkI(kkLR).filter(m=>!kkItems2.some(x=>x.slug===m.slug)):[];
    const jkItems2=jkR?(jkR.data||[]):[];
    const ytItems=(ytR||[]).slice(0,4);

    let cards=[];
    const ml=Math.max(kkItems2.length,kkLItems.length,jkItems2.length);
    for(let i=0;i<ml;i++){
      if(i<kkItems2.length) cards.push(CardKK(kkItems2[i]));
      if(i<kkLItems.length) cards.push(CardKK(kkLItems[i]));
      if(i<jkItems2.length) cards.push(CardAnime(jkItems2[i]));
    }
    // YT dạng card đứng
    ytItems.forEach(v=>{
      const vid=v.videoId||''; const t=esc(v.title||''); const thumb=ytThumb(v);
      cards.push(`<div class="card" onclick="go('play-yt',{ytId:'${vid}'})">
        <div class="c-poster"><img src="${esc(thumb)}" alt="${t}" loading="lazy" onerror="this.src='${PH()}'">
        <span class="c-badge cb-yt">🔴 YT</span>
        <div class="c-ov"><div class="c-play">▶</div></div></div>
        <div class="c-info"><div class="c-title">${t}</div><div class="c-sub">${esc(v.author||'')}</div></div>
      </div>`);
    });

    const total=kkItems2.length+kkLItems.length+jkItems2.length+ytItems.length;
    if(p===1){ grid.innerHTML=cards.join('')||`<div style="text-align:center;padding:48px;color:var(--mu)">Không tìm thấy "<strong>${esc(q)}</strong>"</div>`; }
    else{ grid.insertAdjacentHTML('beforeend',cards.join('')); }
    if(count) count.textContent=total?`${total} kết quả cho "${q}"`:' ';
    if(more) more.innerHTML=total>=20?`<button class="btn btn-ghost" onclick="runSearch('${esc(q)}',${p+1})">Tải thêm ↓</button>`:'';
  }catch(e){
    if(grid) grid.innerHTML=`<div style="text-align:center;padding:48px;color:var(--mu)">Lỗi: ${esc(e.message)}</div>`;
  }
};

//  WATCHLIST PAGE
// ═══════════════════════════════════════
function pgWatchlist(){
  const app=document.getElementById('app');
  function srcTag(m){
    if(m.src==='ani') return '<span class="tag ani">🎌</span>';
    if(m.src==='yt')  return '<span class="tag yt">🔴</span>';
    return '<span class="tag vn">🇻🇳</span>';
  }
  function wCard(m){
    const t=esc(m.name||'?'), po=m.thumb||PH(), y=m.year||'';
    let oc,pc;
    if(m.src==='ani'){oc=`go('det-ani',{malId:${m.malId}})`;pc=`go('play-ani',{malId:${m.malId}})`;}
    else if(m.src==='yt'){oc=`go('play-yt',{ytId:'${esc(m.ytId||m.uid.replace('yt_',''))}'})`; pc=oc;}
    else{oc=`go('det-kk',{slug:'${esc(m.slug)}'})`;pc=`go('play-kk',{slug:'${esc(m.slug)}'})` ;}
    return `<div class="card" onclick="${oc}">
      <div class="c-poster"><img src="${po}" loading="lazy" onerror="this.src='${PH()}'">
      <div class="c-ov"><div class="c-play" onclick="event.stopPropagation();${pc}">▶</div></div></div>
      <div class="c-info"><div class="c-title">${t}</div><div class="c-sub">${y} ${srcTag(m)}</div></div>
    </div>`;
  }
  app.innerHTML=renderNav()+`<div class="wl-page page">
    <h1>Thư viện của tôi</h1>
    <p style="font-size:13px;color:var(--mu)">Phim yêu thích & lịch sử — 🇻🇳 Phim Việt · 🎌 Anime · 🔴 YouTube</p>
    <div class="wl-tabs">
      <button class="wl-tab on" id="wt1" onclick="swWL('wl')">❤️ Yêu thích (${S.wl.length})</button>
      <button class="wl-tab" id="wt2" onclick="swWL('hi')">🕑 Lịch sử (${S.hist.length})</button>
    </div>
    <div id="wtc1">${S.wl.length?`<div class="grid">${S.wl.map(wCard).join('')}</div>`:`<div class="empty-state"><div class="ico">🎬</div><h3>Chưa có yêu thích</h3><p>Bấm ❤️ để lưu phim.</p><button class="btn btn-red" onclick="go('home')" style="margin-top:13px">Khám phá</button></div>`}</div>
    <div id="wtc2" style="display:none">${S.hist.length?`<div class="grid">${S.hist.map(wCard).join('')}</div>`:`<div class="empty-state"><div class="ico">🕑</div><h3>Chưa có lịch sử</h3><p>Xem phim để xuất hiện ở đây.</p></div>`}</div>
  </div>`;
  window.swWL=t=>{
    document.getElementById('wtc1').style.display=t==='wl'?'':'none';
    document.getElementById('wtc2').style.display=t==='hi'?'':'none';
    document.getElementById('wt1').className='wl-tab'+(t==='wl'?' on':'');
    document.getElementById('wt2').className='wl-tab'+(t==='hi'?' on':'');
  };
  setupNavScroll();
}

// ═══════════════════════════════════════
//  NAV SEARCH DROPDOWN
// ═══════════════════════════════════════
let _navT;
window.navInput = async function(q){
  const drop=document.getElementById('drop'); if(!drop) return;
  if(!q.trim()){ drop.className=''; drop.innerHTML=''; return; }
  clearTimeout(_navT);
  drop.className='show';
  drop.innerHTML='<div style="padding:12px;text-align:center"><span class="spin"></span></div>';
  _navT=setTimeout(async function(){
    try{
      const [kkR,jkR,ytR]=await Promise.all([
        kkSearch(q,1).catch(()=>null),
        jkSearch(q,1).catch(()=>null),
        ytSearch(q,1).catch(()=>[]),
      ]);
      const ki=(kkR?kkI(kkR):[]).slice(0,4);
      const ji=(jkR?(jkR.data||[]):[]).slice(0,3);
      const yi=(ytR||[]).slice(0,3);
      if(!ki.length&&!ji.length&&!yi.length){ drop.className=''; drop.innerHTML=''; return; }
      let html='';
      if(ki.length){
        html+='<div class="drop-sep">🇻🇳 Phim Việt (KKPhim)</div>';
        html+=ki.map(m=>`<div class="drop-item" onclick="go('det-kk',{slug:'${m.slug}'});closeNav()">
          <img src="${fixImg(m.thumb_url||m.poster_url)||PH(32,48)}" onerror="this.src='${PH(32,48)}'">
          <div><div class="di-title">${esc(m.name||m.title||'')}</div>
          <div class="di-sub"><span class="tag vn">KKPhim</span>${esc(m.year||'')}</div></div>
        </div>`).join('');
      }
      if(ji.length){
        html+='<div class="drop-sep">🎌 Anime (Jikan/MAL)</div>';
        html+=ji.map(m=>{ const imgs=m.images||{}; const po2=(imgs.jpg&&imgs.jpg.image_url)||(imgs.webp&&imgs.webp.image_url)||PH(32,48);
          return `<div class="drop-item" onclick="go('det-ani',{malId:${m.mal_id}});closeNav()">
            <img src="${po2}" onerror="this.src='${PH(32,48)}'">
            <div><div class="di-title">${esc(m.title||'')}</div>
            <div class="di-sub"><span class="tag ani">Anime</span>${esc(m.year||'')}</div></div>
          </div>`;}).join('');
      }
      if(yi.length){
        html+='<div class="drop-sep">🔴 YouTube</div>';
        html+=yi.map(v=>`<div class="drop-item yt-row" onclick="go('play-yt',{ytId:'${esc(v.videoId||'')}'}); closeNav()">
          <img src="${esc(ytThumb(v))}" onerror="this.src='${PH(54,34)}'">
          <div><div class="di-title">${esc(v.title||'')}</div>
          <div class="di-sub"><span class="tag yt">YouTube</span>${esc(v.author||'')}</div></div>
        </div>`).join('');
      }
      html+=`<div class="drop-more" onclick="go('search',{q:'${esc(q)}'});closeNav()">Xem tất cả kết quả cho "${esc(q)}" →</div>`;
      drop.innerHTML=html; drop.className='show';
    }catch(e){ drop.className=''; drop.innerHTML=''; }
  },360);
};
window.closeNav=()=>{ const d=document.getElementById('drop'); if(d){d.className='';d.innerHTML='';} };
document.addEventListener('click',e=>{ const sw=document.getElementById('sw'); if(sw&&!sw.contains(e.target)) closeNav(); });

// ═══════════════════════════════════════
//  ROUTER
// ═══════════════════════════════════════
function render(){
  clearInterval(window._ht);
  switch(S.page){
    case 'home':      pgHome();      break;
    case 'lt':        pgLT();        break;
    case 'cat':       pgCat();       break;
    case 'det-kk':    pgDetKK();     break;
    case 'det-ani':   pgDetAni();    break;
    case 'play-kk':   pgPlayKK();    break;
    case 'play-ani':  pgPlayAni();   break;
    case 'play-yt':   pgPlayYT();    break;
    case 'search':    pgSearch();    break;
    case 'watchlist': pgWatchlist(); break;
    default:          pgHome();
  }
}
window.render = render;
render();
</script>
</body>
</html>
