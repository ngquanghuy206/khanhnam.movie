077\u002e\u0067\u006f\u0020\u003d\u0020\u0066\u0075\u006e\u0063\u0074\u0069\u006f\u006e\u0028\u0070\u0061\u0067\u0065\u002c\u0020\u006f\u0070\u0074\u0073\u0029\u007b\u000a\u0020\u0020\u006f\u0070\u0074\u0073\u0020\u003d\u0020\u006f\u0070\u0074\u0073\u007c\u007c\u007b\u007d\u003b\u000a\u0020\u0020\u0053\u002e\u0070\u0061\u0067\u0065\u0020\u003d\u0020\u0070\u0061\u0067\u0065\u003b\u000a\u0020\u0020\u005b\u0027\u0073\u006c\u0075\u0067\u0027\u002c\u0027\u006d\u0061\u006c\u0049\u0064\u0027\u002c\u0027\u0079\u0074\u0049\u0064\u0027\u002c\u0027\u0071\u0027\u002c\u0027\u0073\u0072\u0063\u0027\u002c\u0027\u0063\u0061\u0074\u0027\u002c\u0027\u006c\u0074\u0054\u0061\u0062\u0027\u005d\u002e\u0066\u006f\u0072\u0045\u0061\u0063\u0068\u0028\u006b\u003d\u003e\u007b\u0020\u0069\u0066\u0028\u006f\u0070\u0074\u0073\u005b\u006b\u005d\u0021\u003d\u003d\u0075\u006e\u0064\u0065\u0066\u0069\u006e\u0065\u0064\u0029\u0020\u0053\u005b\u006b\u005d\u003d\u006f\u0070\u0074\u0073\u005b\u006b\u005d\u003b\u0020\u007d\u0029\u003b\u000a\u0020\u0020\u0053\u002e\u0065\u0070\u0049\u0064\u0078\u003d\u0030\u003b\u0020\u0053\u002e\u0073\u0076\u0049\u0064\u0078\u003d\u0030\u003b\u0020\u0053\u002e\u0065\u0070\u004e\u0075\u006d\u003d\u0031\u003b\u0020\u0053\u002e\u0064\u0075\u0062\u003d\u0030\u003b\u000a\u0020\u0020\u0077\u0069\u006e\u0064\u006f\u0077\u002e\u0073\u0063\u0072\u006f\u006c\u006c\u0054\u006f\u0028\u007b\u0074\u006f\u0070\u003a\u0030\u002c\u0062\u0065\u0068\u0061\u0076\u0069\u006f\u0072\u003a\u0027\u0073\u006d\u006f\u006f\u0074\u0068\u0027\u007d\u0029\u003b\u000a\u0020\u0020\u0072\u0065\u006e\u0064\u0065\u0072\u0028\u0029\u003b\u000a\u007d\u003b\u000a\u000a\u002f\u002f\u0020\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u000a\u002f\u002f\u0020\u0020\u0042\u0041\u0044\u0047\u0045\u0020\u002b\u0020\u0054\u0045\u005
